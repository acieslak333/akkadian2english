# NLLB-200 Debug Configuration (Fast)
model:
  name: "t5-small"
  source_lang: "en"
  target_lang: "en"
  max_length: 32

data:
  train_path: "data/processed/train_cleaned_norm.csv"
  val_path: "data/processed/val_cleaned_norm.csv"
  output_dir: "./models/t5_small_debug"

training:
  learning_rate: 2.0e-5
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  eval_strategy: "steps"
  save_strategy: "steps"
  eval_steps: 1
  save_steps: 1
  save_total_limit: 1
  fp16: false
  load_best_model_at_end: true
  metric_for_best_model: "geo_mean"
  logging_dir: "./logs"
  logging_steps: 1
  max_steps: 2
